name: Prod Deploy (Vercel)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Deploy to Production (Vercel)
        if: success()
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.ITHUB_TOKEN }}
        run: |
          echo "Starting production deployment via Vercel CLI..."
          npx vercel deploy --prod --token "$VERCEL_TOKEN" --confirm
          echo "Deployment to production completed."
