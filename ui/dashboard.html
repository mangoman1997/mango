<!DOCTYPE html>
<html lang="zh-Hans-CN">
<head>
  <meta charset="UTF-8" />
  <title>Day 3 專案監控面板</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f5f7fa; color:#333; }
    .container{ width:1100px; margin:40px auto; }
    h1{ font-size:28px; margin-bottom:10px; }
    .grid{ display:grid; grid-template-columns: 1fr 1fr; gap:12px; }
    .card{ background:white; border-radius:8px; padding:16px; box-shadow:0 2px 6px rgba(0,0,0,.05); }
    .title{ font-weight:600; margin-bottom:8px; }
    .progress{ height: 14px; border-radius: 7px; background:#eee; overflow:hidden; position:relative; }
    .bar{ height:100%; width:0%; background: #4caf50; transition: width .5s ease; }
    .bar.warning{ background:#ff9800; }
    .bar.danger{ background:#f44336; }
    .eta{ font-size:12px; color:#555; margin-top:6px; }
    .row{ display:flex; align-items:center; justify-content:space-between; padding:6px 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Day 3 專案監控面板</h1>
    <div class="grid" id="panels">
      <!-- dynamic panels will be injected -->
    </div>
  </div>
  <script src="dashboard.js"></script>
</body>
</html>
