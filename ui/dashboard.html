<!DOCTYPE html>
<html lang="zh-Hans-CN">
<head>
  <meta charset="UTF-8" />
  <title>蝦代購 專案監控面板</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f5f7fa; color:#333; }
    .container{ width:1100px; margin:40px auto; }
    h1{ font-size:28px; margin-bottom:10px; }
    .card{ background:white; border-radius:8px; padding:16px; box-shadow:0 2px 6px rgba(0,0,0,.05); margin-bottom:12px; }
    .grid{ display:grid; grid-template-columns: 1fr 1fr 1fr; gap:12px; }
    .item{ padding:12px; border-radius:6px; border:1px solid #e5e5e5; }
    .title{ font-weight:bold; margin-bottom:6px; }
    .value{ font-family: monospace; background:#f6f6f6; padding:4px 6px; border-radius:4px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>蝦代購 專案監控面板</h1>
    <div class="grid" id="panels">
      <!-- dynamic panels -->
    </div>
  </div>
  <script src="dashboard.js"></script>
</body>
</html>
