<!DOCTYPE html>
<html lang="zh-Hans-CN">
<head>
  <meta charset="UTF-8" />
  <title>蝦代購 (ShopperProxy) - 監控面板 (Dark Mode)</title>
  <style>
    /* Night Mode Theme */
    :root {
      --bg-color: #121212;
      --card-bg: #1e1e1e;
      --text-main: #e0e0e0;
      --text-muted: #9e9e9e;
      --border-color: #333;
      --accent-success: #4caf50;
      --accent-info: #2196f3;
      --track-bg: #333;
    }
    body { font-family: Arial, sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; }
    .container { max-width: 1100px; margin: 20px auto; }
    h1 { font-size: 26px; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 16px; }
    .card { background: var(--card-bg); border-radius: 8px; padding: 16px; border: 1px solid var(--border-color); box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
    .title { font-weight: 600; margin-bottom: 10px; font-size: 16px; color: #fff; }
    .progress { height: 12px; border-radius: 6px; background: var(--track-bg); overflow: hidden; position: relative; margin-bottom: 8px; }
    .bar { height: 100%; width: 0%; background: var(--accent-success); transition: width 0.5s ease; }
    .eta { font-size: 13px; color: var(--text-muted); }
    .task-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border-color); }
    .task-row:last-child { border-bottom: none; }
    .task-meta { font-size: 12px; color: var(--text-muted); }
  </style>
</head>
<body>
  <div class="container">
    <h1>蝦代購 專案監控面板 <span>(Live Sync)</span></h1>
    <div class="grid" id="panels">
      <!-- dynamic panels will be injected here -->
    </div>
  </div>
  <script src="dashboard.js"></script>
</body>
</html>
